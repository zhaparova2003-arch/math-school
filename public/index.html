<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math School</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #334155;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      color: #f87171;
    }

    #welcome {
      margin-top: 15px;
      background: #16a34a;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Вход</h2>

  <input id="login" placeholder="Логин">
  <input id="password" type="password" placeholder="Пароль">

  <button onclick="login()">Войти</button>

  <div id="msg"></div>
  <div id="welcome"></div>
</div>

<script>
async function login() {
  const loginValue = document.getElementById("login").value.trim();
  const passwordValue = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  const welcome = document.getElementById("welcome");

  msg.textContent = "";
  welcome.style.display = "none";

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        login: loginValue,
        password: passwordValue
      })
    });

    const data = await res.json();

    if (data.success) {
      welcome.style.display = "block";
      welcome.innerHTML = `
        Добро пожаловать, <b>${data.user.fio}</b><br>
        Роль: ${data.user.role}<br>
        Класс: ${data.user["class"]}
      `;
    } else {
      msg.textContent = data.message || "Неверный логин или пароль";
    }

  } catch (err) {
    console.error(err);
    msg.textContent = "Ошибка соединения с сервером";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math School</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: 360px;
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }
    input {
      background: #334155;
      color: white;
    }
    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #1d4ed8;
    }
    #msg {
      margin-top: 14px;
      text-align: center;
      color: #fca5a5;
    }
    #welcome {
      margin-top: 16px;
      padding: 12px;
      background: #0b5;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Вход в систему</h1>
    <input id="login" placeholder="Логин" />
    <input id="password" type="password" placeholder="Пароль" />
    <button onclick="login()">Войти</button>
    <div id="msg"></div>
    <div id="welcome"></div>
  </div>

  <script>
    async function login() {
      const loginValue = document.getElementById("login").value;
      const passwordValue = document.getElementById("password").value;
      const msg = document.getElementById("msg");
      const welcome = document.getElementById("welcome");

      msg.textContent = "";
      welcome.style.display = "none";

      const res = await fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          login: loginValue,
          password: passwordValue
        })
      });

      const data = await res.json();

      if (data.success) {
        welcome.style.display = "block";
        welcome.innerHTML = `
          Добро пожаловать, <b>${data.user.fio}</b><br>
          Роль: ${data.user.role}<br>
          Класс: ${data.user.class}
        `;
      } else {
        msg.textContent = "Неверный логин или пароль";
      }
    }
  </script>
</body>
</html>
